        <div id="suggestionsB" style="position: absolute; top: 100%; left: 0; width: 200px; margin-top: 4px; max-height: 200px; overflow-y: auto; background: #1a1a1a; border: 1px solid #666; border-radius: 4px; display: none; z-index: 1001;"></div>
    </div>
    <button onclick="resetHighlight()" style="padding: 6px 12px; background: #444; color: white; border: 1px solid #666; border-radius: 4px; cursor: pointer; font-size: 13px;">Reset</button>
    <label style="color: #ccc; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap;">
        <input type="checkbox" id="showLines" checked onchange="toggleLines()"
               style="cursor: pointer; width: 15px; height: 15px;">
        Cluster links
    </label>
</div>

<script>
var scientists = ["Aleksandra Sadurska", "Arturo Espinosa Baro", "Azam Jahandideh", "Bartłomiej Grzelak", "Grzegorz Adamski", "Jacek Kałużny", "Jan Wojciech Nowak", "Janik Kruse", "Krzysztof Koczorowski", "Mateusz Litka", "Michał Piotr Junczyk", "Michał Turski", "dr Abhishek Goswami", "dr Adam Nawrocki", "dr Adam Przestacki", "dr Andrzej Kokosza", "dr Andrzej Wójtowicz", "dr Arkadiusz Hypki", "dr Barbara Kołodziejczak", "dr Bartosz Naskręcki", "dr Bartłomiej Przybylski", "dr Dominik Filipiak", "dr Dorota Janina Blinkiewicz", "dr Hubert Przybycień", "dr Irakli Kardava", "dr Janusz Przewocki", "dr Joanna Siwek", "dr Jolanta Marzec-Ballesteros", "dr Jędrzej Garnek", "dr Katarzyna Taczała", "dr Marcin Jan Żurowski", "dr Marek Kubis", "dr Michał Goliński", "dr Michał Rzeczkowski", "dr Mirosława Kołowska-Gawiejnowicz", "dr Paweł Duch", "dr Paweł Marek Skórzewski", "dr Paweł Mleczko", "dr Rafał Tomasz Jaworski", "dr Sohail Farhangi", "dr Sylwia Antoniuk", "dr Tomasz Ciaś", "dr Tomasz Kazimierz Piłka", "dr Vitalii Marchenko", "dr Wojciech Piotr Pałubicki", "dr Wojciech Wawrzyniak", "dr inż. Anna Pankowska", "dr inż. Artur Adam Nowakowski", "dr inż. Dawid Ewald", "dr inż. Marcin Michał Szczepański", "dr inż. Marcin Witkowski", "dr inż. Michał Krzysztof Ren", "dr inż. Piotr Mizerka", "dr inż. Łukasz Michalak", "dr Łukasz Damian Szymula", "mgr Dominika Grajewska", "mgr inż. Piotr Adam Jabłoński", "prof. UAM dr Edyta Maria Juskowiak", "prof. UAM dr hab. Aldona Dutkiewicz", "prof. UAM dr hab. Andrzej Sołtysiak", "prof. UAM dr hab. Aneta Sikorska-Nowak", "prof. UAM dr hab. Artur Michalak", "prof. UAM dr hab. Daria Barbara Bugajewska", "prof. UAM dr hab. Filip Graliński", "prof. UAM dr hab. Jacek Marciniak", "prof. UAM dr hab. Jerzy Grzybowski", "prof. UAM dr hab. Joanna Helena Berlińska", "prof. UAM dr hab. Joanna Polcyn-Lewandowska", "prof. UAM dr hab. Karol Leśnik", "prof. UAM dr hab. Katarzyna Rybarczyk-Krzywdzińska", "prof. UAM dr hab. Krzysztof Dyczkowski", "prof. UAM dr hab. Krzysztof Jassem", "prof. UAM dr hab. Krzysztof Piszczek", "prof. UAM dr hab. Maciej Grześkowiak", "prof. UAM dr hab. Maciej Radziejewski", "prof. UAM dr hab. Maciej Łuczak", "prof. UAM dr hab. Marek Nawrocki", "prof. UAM dr hab. Marek Wisła", "prof. UAM dr hab. Michał Hanćkowiak", "prof. UAM dr hab. Michał Jasiczak", "prof. UAM dr hab. Mieczysław Cichoń", "prof. UAM dr hab. Patryk Żywica", "prof. UAM dr hab. Paweł Foralewski", "prof. UAM dr hab. Piotr Kasprzak", "prof. UAM dr hab. Piotr Maćkowiak", "prof. UAM dr hab. Radosław Kaczmarek", "prof. UAM dr hab. Radosław Szwedek", "prof. UAM dr hab. Sebastian Mariusz Król", "prof. UAM dr hab. Tomasz Górecki", "prof. UAM dr hab. Tomasz Szulc", "prof. UAM dr hab. Waldemar Wołyński", "prof. UAM dr hab. William Mance", "prof. UAM dr hab. Wojciech Dybalski", "prof. UAM dr hab. Zbigniew Palka", "prof. UAM dr hab. Łukasz Pańkowski", "prof. UAM dr hab. Łukasz Smaga", "prof. dr hab. Andrzej Ruciński", "prof. dr hab. Dariusz Bugajewski", "prof. dr hab. Grzegorz Marian Banaszak", "prof. dr hab. Jerzy Jaworski", "prof. dr hab. Jerzy Kaczorowski", "prof. dr hab. Jerzy Kąkol", "prof. dr hab. Krzysztof Pawałowski", "prof. dr hab. Leszek Skrzypczak", "prof. dr hab. Mieczysław Mastyło", "prof. dr hab. Roman Murawski", "prof. dr hab. Stanisław Gawiejnowicz", "prof. dr hab. Tomasz Kubiak", "prof. dr hab. Tomasz Schoen", "prof. dr hab. Tomasz Łuczak", "prof. dr hab. Wacław Bolesław Marzantowicz", "prof. dr hab. Witold Wnuk", "prof. dr hab. Wojciech Buszkowski", "prof. dr hab. Wojciech Gajda", "prof. dr hab. Zygmunt Vetulani"];
var lineTraceIdx = 19;

var selectedA = null;
var selectedB = null;

function setupSearch(inputId, suggestionsId, slot) {
    var input = document.getElementById(inputId);
    var sugDiv = document.getElementById(suggestionsId);

    input.addEventListener('input', function() {
        var query = this.value.toLowerCase();
        sugDiv.innerHTML = '';

        if (query.length === 0) {
            sugDiv.style.display = 'none';
            if (slot === 'A') selectedA = null;
            else selectedB = null;
            applyHighlight();
            return;
        }

        var matches = scientists.filter(function(name) {
            return name.toLowerCase().includes(query);
        });

        if (matches.length > 0) {
            sugDiv.style.display = 'block';
            matches.forEach(function(name) {
                var div = document.createElement('div');
                div.textContent = name;
                div.style.padding = '5px 10px';
                div.style.cursor = 'pointer';
                div.style.color = 'white';
                div.style.fontSize = '13px';
                div.onmouseover = function() { this.style.background = '#444'; };
                div.onmouseout = function() { this.style.background = 'transparent'; };
                div.onclick = function() {
                    input.value = name;
                    sugDiv.style.display = 'none';
                    if (slot === 'A') selectedA = name;
                    else selectedB = name;
                    applyHighlight();
                };
                sugDiv.appendChild(div);
            });
        } else {
            sugDiv.style.display = 'none';
        }
    });
}

setupSearch('searchA', 'suggestionsA', 'A');
setupSearch('searchB', 'suggestionsB', 'B');

function toggleLines() {
    var gd = document.getElementsByClassName('plotly-graph-div')[0];
    var show = document.getElementById('showLines').checked;
    Plotly.restyle(gd, {'visible': show}, [lineTraceIdx]);
}

function applyHighlight() {
    var gd = document.getElementsByClassName('plotly-graph-div')[0];
    var anySelected = (selectedA !== null || selectedB !== null);

    var update = {
        'marker.size': [],
        'marker.line.width': [],
        'marker.line.color': [],
        'marker.opacity': []
    };

    for (var i = 0; i < gd.data.length; i++) {
        var trace = gd.data[i];
        if (!trace.text || trace.mode === 'lines') {
            update['marker.size'].push(undefined);
            update['marker.line.width'].push(undefined);
            update['marker.line.color'].push(undefined);
            update['marker.opacity'].push(undefined);
            continue;
        }

        var sizes = [];
        var lineWidths = [];
        var lineColors = [];
        var opacities = [];

        for (var j = 0; j < trace.text.length; j++) {
            var name = trace.text[j];
            var baseSize = trace.marker.size[j] || 8;

            if (name === selectedA) {
                sizes.push(22);
                lineWidths.push(3);
                lineColors.push('#f0e130');
                opacities.push(1.0);
            } else if (name === selectedB) {
                sizes.push(22);
                lineWidths.push(3);
                lineColors.push('#00e5ff');
                opacities.push(1.0);
            } else {
                sizes.push(baseSize);
                lineWidths.push(anySelected ? 0 : 0.5);
                lineColors.push(anySelected ? '' : 'rgba(255,255,255,0.3)');
                opacities.push(anySelected ? 0.15 : 1.0);
            }
        }

        update['marker.size'].push(sizes);
        update['marker.line.width'].push(lineWidths);
        update['marker.line.color'].push(lineColors);
        update['marker.opacity'].push(opacities);
    }

    Plotly.restyle(gd, update);
}

function resetHighlight() {
    selectedA = null;
    selectedB = null;
    document.getElementById('searchA').value = '';
    document.getElementById('searchB').value = '';
    document.getElementById('suggestionsA').style.display = 'none';
    document.getElementById('suggestionsB').style.display = 'none';

    var gd = document.getElementsByClassName('plotly-graph-div')[0];
    for (var i = 0; i < gd.data.length; i++) {
        var trace = gd.data[i];
        if (!trace.text || trace.mode === 'lines') continue;

        Plotly.restyle(gd, {
            'marker.line.width': 0.5,
            'marker.line.color': 'rgba(255,255,255,0.3)',
            'marker.opacity': 1.0,
        }, [i]);
    }
}

document.addEventListener('click', function(event) {
    var sugA = document.getElementById('suggestionsA');
    var sugB = document.getElementById('suggestionsB');
    var inA = document.getElementById('searchA');
    var inB = document.getElementById('searchB');
    if (!inA.contains(event.target) && !sugA.contains(event.target)) {
        sugA.style.display = 'none';
    }
    if (!inB.contains(event.target) && !sugB.contains(event.target)) {
        sugB.style.display = 'none';
    }
});
</script>
